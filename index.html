<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oasis - Relatório de Custo de Produção</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .export-container {
            padding: 40px;
            background: white;
            width: 850px;
        }
        
        .no-print { display: block; }
        @media print {
            .no-print { display: none; }
        }

        #export-template {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [formData, setFormData] = useState({
                bloco: '', ciclo: '', numCiclo: '', dataInicio: '', dataFim: '', 
                totalTransplantado: '', totalColhido: '', totalKg: '',
                custoVendaKg: '', 
                litrosDia: '',
                litrosPlantaManual: '',
                volumeTotalL: '',
                caixas: '',
                custosInsumos: [{ descricao: '', valor: '' }],
                custosOperacionais: [{ categoria: '', valor: '' }]
            });

            const [relatorios, setRelatorios] = useState([]);
            const exportRef = useRef(null);
            const categoriasOperacionais = ["Enel", "Folha", "MEI", "Avulso", "Capina", "Transporte", "Outros"];

            const metrics = useMemo(() => {
                let dias = 0;
                if (formData.dataInicio && formData.dataFim) {
                    const start = new Date(formData.dataInicio);
                    const end = new Date(formData.dataFim);
                    const diff = end - start;
                    dias = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                }

                const totalInsumos = formData.custosInsumos.reduce((acc, curr) => acc + (parseFloat(curr.valor) || 0), 0);
                const totalOperacional = formData.custosOperacionais.reduce((acc, curr) => acc + (parseFloat(curr.valor) || 0), 0);
                const totalGeral = totalInsumos + totalOperacional;
                const kg = parseFloat(formData.totalKg) || 0;
                const colhido = parseFloat(formData.totalColhido) || 0;
                const pesoMedio = (kg > 0 && colhido > 0) ? ((kg / colhido) * 1000).toFixed(0) : "0";
                
                return {
                    diasCiclo: dias,
                    totalInsumos,
                    totalOperacional,
                    totalGeral,
                    pesoMedio,
                    custoProducaoKg: kg > 0 ? (totalGeral / kg).toFixed(2) : "0.00"
                };
            }, [formData]);

            const prepararExportacao = async () => {
                const element = exportRef.current;
                element.style.position = "static";
                element.style.left = "0";
                const canvas = await html2canvas(element, { scale: 3, useCORS: true, backgroundColor: "#ffffff" });
                element.style.position = "absolute";
                element.style.left = "-9999px";
                return canvas;
            };

            const exportarImagem = async () => {
                const canvas = await prepararExportacao();
                const link = document.createElement('a');
                link.download = `Oasis_Relatorio_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const exportarPDF = async () => {
                const { jsPDF } = window.jspdf;
                const canvas = await prepararExportacao();
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const imgProps = pdf.getImageProperties(imgData);
                const canvasHeightInPdf = (imgProps.height * pdfWidth) / imgProps.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, canvasHeightInPdf);
                pdf.save(`Oasis_Relatorio_${Date.now()}.pdf`);
            };

            const handleChange = (e) => setFormData(p => ({ ...p, [e.target.name]: e.target.value }));

            const updateList = (type, index, field, value) => {
                const list = [...formData[type]];
                list[index][field] = value;
                setFormData(p => ({ ...p, [type]: list }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const agora = new Date();
                const novoRelatorio = {
                    ...formData,
                    id: Date.now(),
                    ...metrics,
                    // Filtramos itens vazios antes de salvar para o registro ficar limpo
                    custosInsumos: formData.custosInsumos.filter(i => i.descricao && i.valor),
                    custosOperacionais: formData.custosOperacionais.filter(o => o.categoria && o.valor),
                    dataRegistro: agora.toLocaleDateString('pt-BR'),
                    horaRegistro: agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                };
                setRelatorios([novoRelatorio, ...relatorios]);
                setFormData({
                    bloco: '', ciclo: '', numCiclo: '', dataInicio: '', dataFim: '', totalTransplantado: '', totalColhido: '', totalKg: '',
                    custoVendaKg: '', litrosDia: '', litrosPlantaManual: '', volumeTotalL: '', caixas: '', custosInsumos: [{ descricao: '', valor: '' }], custosOperacionais: [{ categoria: '', valor: '' }]
                });
            };

            return (
                <div className="min-h-screen flex flex-col pb-10">
                    
                    {/* TEMPLATE DE EXPORTAÇÃO (ESCONDIDO) */}
                    <div id="export-template" ref={exportRef} className="export-container">
                        <div className="flex items-center justify-between border-b-4 border-emerald-600 pb-8 mb-8">
                            <div className="flex items-center gap-6">
                                <img src="https://i.imgur.com/qsYPvR2.png" alt="Logo Oasis" className="h-20 w-auto" />
                                <div>
                                    <h1 className="text-3xl font-black text-emerald-800 uppercase leading-none">Fazenda Oasis</h1>
                                    <p className="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Relatório Consolidado de Produção</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-xs font-black text-slate-400 uppercase tracking-widest">Emitido em</p>
                                <p className="text-xl font-bold text-slate-700">{new Date().toLocaleDateString('pt-BR')}</p>
                            </div>
                        </div>

                        <div className="space-y-12">
                            {relatorios.map(rel => (
                                <div key={rel.id} className="border-2 border-slate-100 p-8 rounded-[2rem] bg-white">
                                    <div className="flex justify-between items-start mb-8 border-b pb-6">
                                        <div>
                                            <p className="text-xs font-black text-emerald-600 uppercase tracking-widest mb-1">{rel.bloco}</p>
                                            <h3 className="text-4xl font-black text-slate-800 uppercase leading-tight">
                                                {rel.ciclo} <span className="text-emerald-500">#{rel.numCiclo}</span>
                                            </h3>
                                            <p className="text-xs font-bold text-slate-400 uppercase mt-2">
                                                Ciclo: {new Date(rel.dataInicio).toLocaleDateString()} — {new Date(rel.dataFim).toLocaleDateString()} ({rel.diasCiclo} dias)
                                            </p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs font-black text-slate-400 uppercase mb-1">Custo Total do Lote</p>
                                            <p className="text-4xl font-black text-emerald-600">R$ {parseFloat(rel.totalGeral).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                            <p className="text-sm font-black text-slate-500 mt-2 uppercase tracking-tighter">Custo Unitário: R$ {rel.custoProducaoKg}/kg</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-8">
                                        {/* Detalhes de Produção no PDF */}
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-2xl">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-4 border-b pb-2">Resumo da Colheita</h4>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Produção Total</p>
                                                        <p className="text-lg font-black text-slate-700">{rel.totalKg} kg</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Volume Colhido</p>
                                                        <p className="text-lg font-black text-slate-700">{rel.totalColhido} un</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Peso Médio</p>
                                                        <p className="text-lg font-black text-blue-600">{rel.pesoMedio} g</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold">Total Caixas</p>
                                                        <p className="text-lg font-black text-slate-700">{rel.caixas} cx</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-blue-50/50 p-6 rounded-2xl border border-blue-100">
                                                <h4 className="text-xs font-black text-blue-400 uppercase mb-4 border-b border-blue-100 pb-2">Hidratação e Clima</h4>
                                                <div className="space-y-2">
                                                    <p className="text-sm font-bold flex justify-between"><span>Consumo Diário:</span> <span className="font-black">{rel.litrosDia} L</span></p>
                                                    <p className="text-sm font-bold flex justify-between"><span>Consumo p/ Planta:</span> <span className="font-black">{rel.litrosPlantaManual} L</span></p>
                                                    <p className="text-sm font-black text-blue-700 flex justify-between border-t border-blue-100 pt-2"><span>Volume Total Ciclo:</span> <span>{rel.volumeTotalL} Litros</span></p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Detalhes Financeiros no PDF */}
                                        <div className="space-y-6">
                                            <div className="p-6 bg-slate-50 rounded-2xl">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-4 border-b pb-2">Detalhamento de Insumos</h4>
                                                <div className="space-y-2">
                                                    {rel.custosInsumos.map((ins, idx) => (
                                                        <div key={idx} className="flex justify-between text-xs font-bold border-b border-slate-200/50 pb-1 last:border-0">
                                                            <span className="text-slate-500 uppercase">{ins.descricao}</span>
                                                            <span className="text-slate-700">R$ {parseFloat(ins.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                        </div>
                                                    ))}
                                                    <div className="pt-2 text-right">
                                                        <p className="text-[10px] font-black text-emerald-600 uppercase">Total Insumos: R$ {rel.totalInsumos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="p-6 bg-emerald-50/30 rounded-2xl border border-emerald-100">
                                                <h4 className="text-xs font-black text-emerald-600 uppercase mb-4 border-b border-emerald-100 pb-2">Detalhamento Operacional</h4>
                                                <div className="space-y-2">
                                                    {rel.custosOperacionais.map((ope, idx) => (
                                                        <div key={idx} className="flex justify-between text-xs font-bold border-b border-emerald-100 pb-1 last:border-0">
                                                            <span className="text-emerald-700/70 uppercase">{ope.categoria}</span>
                                                            <span className="text-emerald-800">R$ {parseFloat(ope.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                        </div>
                                                    ))}
                                                    <div className="pt-2 text-right">
                                                        <p className="text-[10px] font-black text-emerald-700 uppercase">Total Operacional: R$ {rel.totalOperacional.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* INTERFACE DO USUÁRIO PRINCIPAL */}
                    <header className="bg-emerald-700 shadow-md p-6 no-print">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-2 rounded-xl shadow-sm">
                                    <img src="https://i.imgur.com/qsYPvR2.png" alt="Logo Oasis" className="h-10 w-auto" />
                                </div>
                                <h1 className="text-lg font-black text-white uppercase tracking-tighter">
                                    Fazenda Oasis <span className="text-emerald-400 font-light mx-2">|</span> Gestão Financeira
                                </h1>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] text-emerald-200 font-black uppercase tracking-widest">Investimento Consolidado</p>
                                <p className="text-xl font-black text-white">R$ {relatorios.reduce((acc, curr) => acc + parseFloat(curr.totalGeral), 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 grid lg:grid-cols-2 gap-8">
                        {/* FORMULÁRIO */}
                        <div className="no-print space-y-6">
                            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 space-y-6">
                                <h2 className="text-sm font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                    <Icon name="layout" className="w-4 h-4" /> Configuração do Ciclo
                                </h2>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Bloco / Estufa</label>
                                        <input required name="bloco" value={formData.bloco} onChange={handleChange} className="w-full px-4 py-2 text-sm rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 ring-emerald-100" />
                                    </div>
                                    <div className="col-span-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Variedade</label>
                                        <input required name="ciclo" value={formData.ciclo} onChange={handleChange} className="w-full px-4 py-2 text-sm rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 ring-emerald-100" />
                                    </div>
                                    <div className="col-span-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Número do Lote</label>
                                        <input type="number" required name="numCiclo" value={formData.numCiclo} onChange={handleChange} className="w-full px-4 py-2 text-sm rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 ring-emerald-100" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Data de Início</label>
                                        <input type="date" required name="dataInicio" value={formData.dataInicio} onChange={handleChange} className="w-full px-4 py-2 text-sm rounded-xl border border-slate-200 bg-slate-50 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Data de Colheita</label>
                                        <input type="date" required name="dataFim" value={formData.dataFim} onChange={handleChange} className="w-full px-4 py-2 text-sm rounded-xl border border-slate-200 bg-slate-50 outline-none" />
                                    </div>
                                </div>

                                {/* Seção Hídrica */}
                                <div className="p-4 bg-blue-50/50 rounded-2xl border border-blue-100 space-y-4">
                                    <h3 className="text-[10px] font-black text-blue-600 uppercase tracking-widest flex items-center gap-2">
                                        <Icon name="droplets" className="w-3 h-3" /> Gestão Hídrica
                                    </h3>
                                    <div className="grid grid-cols-3 gap-3">
                                        <div>
                                            <label className="text-[9px] font-black text-blue-400 uppercase block mb-1">Litros/Dia</label>
                                            <input type="number" required name="litrosDia" value={formData.litrosDia} onChange={handleChange} className="w-full p-2 text-sm rounded-lg border border-blue-200 bg-white font-bold text-blue-700" />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-blue-400 uppercase block mb-1">Ltrs/Planta</label>
                                            <input type="number" step="0.001" required name="litrosPlantaManual" value={formData.litrosPlantaManual} onChange={handleChange} className="w-full p-2 text-sm rounded-lg border border-blue-200 bg-white font-bold text-blue-700" />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-blue-400 uppercase block mb-1">Vol. Total (L)</label>
                                            <input type="number" required name="volumeTotalL" value={formData.volumeTotalL} onChange={handleChange} className="w-full p-2 text-sm rounded-lg border border-blue-200 bg-white font-bold text-blue-700" />
                                        </div>
                                    </div>
                                </div>

                                {/* Seção de Produção */}
                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-4">
                                    <h3 className="text-[10px] font-black text-slate-600 uppercase tracking-widest flex items-center gap-2">
                                        <Icon name="box" className="w-3 h-3" /> Balanço de Colheita
                                    </h3>
                                    <div className="grid grid-cols-3 gap-3">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Peso Total (kg)</label>
                                            <input type="number" step="0.01" required name="totalKg" value={formData.totalKg} onChange={handleChange} className="w-full p-2 text-sm rounded-lg border border-slate-200 bg-white font-bold text-slate-700" />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Unidades</label>
                                            <input type="number" required name="totalColhido" value={formData.totalColhido} onChange={handleChange} className="w-full p-2 text-sm rounded-lg border border-slate-200 bg-white font-bold text-slate-700" />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Caixas</label>
                                            <input type="number" required name="caixas" value={formData.caixas} onChange={handleChange} className="w-full p-2 text-sm rounded-lg border border-slate-200 bg-white font-bold text-emerald-600" />
                                        </div>
                                        <div className="col-span-1">
                                            <label className="text-[9px] font-black text-slate-400 uppercase block mb-1">Mudas</label>
                                            <input type="number" name="totalTransplantado" value={formData.totalTransplantado} onChange={handleChange} className="w-full p-2 text-xs rounded-lg border border-slate-200 bg-white" />
                                        </div>
                                        <div className="col-span-2 bg-blue-50 p-2 rounded-lg border border-blue-100 flex flex-col justify-center text-center">
                                            <p className="text-[8px] font-black text-blue-400 uppercase">Peso Médio</p>
                                            <p className="text-sm font-black text-blue-800 leading-tight">{metrics.pesoMedio} gramas</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Preço de Venda */}
                                <div>
                                    <label className="text-[10px] font-black text-emerald-600 uppercase mb-1 block tracking-wider">Preço de Venda Sugerido (R$/kg)</label>
                                    <input type="number" step="0.01" name="custoVendaKg" value={formData.custoVendaKg} onChange={handleChange} className="w-full px-4 py-3 text-lg font-black rounded-xl border border-emerald-200 bg-emerald-50 text-emerald-700 outline-none" placeholder="0.00" />
                                </div>

                                {/* Custos Variáveis */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase flex items-center gap-2"><Icon name="flask-conical" className="w-3 h-3" /> Insumos</h3>
                                            <button type="button" onClick={() => setFormData(p => ({...p, custosInsumos: [...p.custosInsumos, {descricao: '', valor: ''}]}))} className="bg-white p-1 rounded-md border shadow-sm hover:bg-emerald-50"><Icon name="plus" className="w-3 h-3 text-emerald-600" /></button>
                                        </div>
                                        {formData.custosInsumos.map((c, i) => (
                                            <div key={i} className="flex gap-2 mb-2">
                                                <input placeholder="Desc." value={c.descricao} onChange={(e) => updateList('custosInsumos', i, 'descricao', e.target.value)} className="flex-grow px-2 py-1.5 text-[10px] rounded-lg border bg-white" />
                                                <input type="number" placeholder="R$" value={c.valor} onChange={(e) => updateList('custosInsumos', i, 'valor', e.target.value)} className="w-16 px-2 py-1.5 text-[10px] rounded-lg border font-bold" />
                                            </div>
                                        ))}
                                    </div>

                                    <div className="p-4 bg-emerald-50/20 rounded-2xl border border-emerald-100">
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-[10px] font-black text-emerald-600 uppercase flex items-center gap-2"><Icon name="users-2" className="w-3 h-3" /> Op.</h3>
                                            <button type="button" onClick={() => setFormData(p => ({...p, custosOperacionais: [...p.custosOperacionais, {categoria: '', valor: ''}]}))} className="bg-white p-1 rounded-md border shadow-sm hover:bg-emerald-50"><Icon name="plus" className="w-3 h-3 text-emerald-600" /></button>
                                        </div>
                                        {formData.custosOperacionais.map((o, i) => (
                                            <div key={i} className="flex gap-2 mb-2">
                                                <select value={o.categoria} onChange={(e) => updateList('custosOperacionais', i, 'categoria', e.target.value)} className="flex-grow px-1 py-1.5 text-[10px] rounded-lg border bg-white">
                                                    <option value="">Cat.</option>
                                                    {categoriasOperacionais.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                </select>
                                                <input type="number" placeholder="R$" value={o.valor} onChange={(e) => updateList('custosOperacionais', i, 'valor', e.target.value)} className="w-16 px-2 py-1.5 text-[10px] rounded-lg border font-bold" />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button type="submit" className="w-full bg-emerald-700 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all">
                                    Salvar Registro de Produção
                                </button>
                            </form>
                        </div>

                        {/* LISTA DE HISTÓRICO */}
                        <div className="bg-white rounded-3xl shadow-xl border border-slate-100 flex flex-col overflow-hidden no-print">
                            <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                                <h2 className="text-sm font-black uppercase text-slate-700 flex items-center gap-2">
                                    <Icon name="scroll-text" className="w-4 h-4" /> Histórico Detalhado
                                </h2>
                                <div className="flex gap-2">
                                    <button onClick={exportarImagem} className="px-3 py-1.5 bg-white border rounded-lg text-[10px] font-black uppercase text-slate-500 hover:bg-slate-100">PNG</button>
                                    <button onClick={exportarPDF} className="px-3 py-1.5 bg-emerald-600 rounded-lg text-[10px] font-black uppercase text-white hover:bg-emerald-700">PDF</button>
                                </div>
                            </div>
                            <div className="flex-grow overflow-y-auto custom-scroll max-h-[85vh]">
                                {relatorios.length === 0 ? (
                                    <div className="p-20 text-center opacity-20">
                                        <Icon name="sun" className="w-12 h-12 mx-auto mb-4" />
                                        <p className="text-xs font-black uppercase">Nenhum registro encontrado</p>
                                    </div>
                                ) : relatorios.map(rel => (
                                    <div key={rel.id} className="p-6 border-b hover:bg-slate-50/50 transition-colors">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-[10px] font-black text-emerald-600 uppercase bg-emerald-50 px-2 py-0.5 rounded-md border border-emerald-100">{rel.bloco}</span>
                                                    <span className="text-[9px] font-bold text-slate-400 uppercase">{rel.dataRegistro}</span>
                                                </div>
                                                <h3 className="font-black text-slate-800 text-xl uppercase">
                                                    {rel.ciclo} <span className="text-emerald-500">#{rel.numCiclo}</span>
                                                </h3>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-2xl font-black text-emerald-600">R$ {parseFloat(rel.totalGeral).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">Custo: R$ {rel.custoProducaoKg}/kg</p>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            {/* Gasto Insumos no Histórico */}
                                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                <p className="text-[8px] font-black text-slate-400 uppercase mb-2 flex items-center justify-between">
                                                    <span>Detalhamento Insumos</span>
                                                    <span className="text-emerald-600">Total: R$ {rel.totalInsumos.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                </p>
                                                <div className="space-y-1">
                                                    {rel.custosInsumos.map((ins, idx) => (
                                                        <div key={idx} className="flex justify-between text-[10px] border-b border-slate-200/50 pb-0.5 last:border-0">
                                                            <span className="text-slate-500 font-bold">{ins.descricao}</span>
                                                            <span className="text-slate-800 font-black">R$ {parseFloat(ins.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Gasto Operacional no Histórico */}
                                            <div className="bg-emerald-50/30 p-3 rounded-xl border border-emerald-100">
                                                <p className="text-[8px] font-black text-emerald-500 uppercase mb-2 flex items-center justify-between">
                                                    <span>Detalhamento Op.</span>
                                                    <span className="text-emerald-700">Total: R$ {rel.totalOperacional.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                </p>
                                                <div className="space-y-1">
                                                    {rel.custosOperacionais.map((ope, idx) => (
                                                        <div key={idx} className="flex justify-between text-[10px] border-b border-emerald-100/50 pb-0.5 last:border-0">
                                                            <span className="text-emerald-600 font-bold">{ope.categoria}</span>
                                                            <span className="text-emerald-900 font-black">R$ {parseFloat(ope.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-4 flex gap-4 text-[9px] font-black text-slate-400 uppercase border-t pt-3">
                                            <span className="flex items-center gap-1"><Icon name="box" className="w-3 h-3"/> {rel.totalKg}kg / {rel.totalColhido}un / {rel.caixas}cx</span>
                                            <span className="flex items-center gap-1 text-blue-500"><Icon name="scale" className="w-3 h-3"/> Médio: {rel.pesoMedio}g</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
    </script>
</body>
</html>
