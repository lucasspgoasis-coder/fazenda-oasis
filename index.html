<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oasis - Gestão de Produção</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Área de exportação com alta legibilidade */
        #export-area { 
            position: absolute; 
            left: -9999px; 
            top: -9999px; 
            width: 1000px; /* Largura maior para melhor escala no PDF */
            background: white; 
            color: #1e293b;
        }

        .print-text-lg { font-size: 24px; font-weight: 900; }
        .print-text-md { font-size: 18px; font-weight: 700; }
        .print-text-sm { font-size: 14px; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        input[type="date"] { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const exportRef = useRef();
            const [editingId, setEditingId] = useState(null);
            
            const initialFormState = {
                bloco: '', ciclo: '', dataInicio: '', dataTermino: '', diasCiclo: 0, 
                totalTransplantado: '', totalColhido: '',
                custosInsumos: [{ descricao: '', valor: '' }],
                custosOperacionais: [{ categoria: '', valor: '' }]
            };

            const [formData, setFormData] = useState(initialFormState);
            const [relatorios, setRelatorios] = useState([]);
            const categoriasOperacionais = ["Enel", "Folha", "MEI", "Avulso", "Capina", "Outros"];

            // Cálculo de Custos do Formulário
            const somaInsumosForm = useMemo(() => {
                return formData.custosInsumos.reduce((acc, curr) => acc + (parseFloat(String(curr.valor).replace(',', '.')) || 0), 0);
            }, [formData.custosInsumos]);

            const somaOperacionalForm = useMemo(() => {
                return formData.custosOperacionais.reduce((acc, curr) => acc + (parseFloat(String(curr.valor).replace(',', '.')) || 0), 0);
            }, [formData.custosOperacionais]);

            const totalGeralForm = somaInsumosForm + somaOperacionalForm;

            // Cálculo Automático de Dias
            useEffect(() => {
                if (formData.dataInicio && formData.dataTermino) {
                    const inicio = new Date(formData.dataInicio);
                    const fim = new Date(formData.dataTermino);
                    const diffTime = fim - inicio;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    setFormData(prev => ({ ...prev, diasCiclo: diffDays > 0 ? diffDays : 0 }));
                }
            }, [formData.dataInicio, formData.dataTermino]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCustoInsumoChange = (index, e) => {
                const { name, value } = e.target;
                const novos = [...formData.custosInsumos];
                novos[index][name] = value;
                setFormData(prev => ({ ...prev, custosInsumos: novos }));
            };

            const handleOperacionalChange = (index, e) => {
                const { name, value } = e.target;
                const novos = [...formData.custosOperacionais];
                novos[index][name] = value;
                setFormData(prev => ({ ...prev, custosOperacionais: novos }));
            };

            const adicionarInsumo = () => setFormData(prev => ({ ...prev, custosInsumos: [...prev.custosInsumos, { descricao: '', valor: '' }] }));
            const adicionarOperacional = () => setFormData(prev => ({ ...prev, custosOperacionais: [...prev.custosOperacionais, { categoria: '', valor: '' }] }));
            const removerInsumo = (index) => setFormData(prev => ({ ...prev, custosInsumos: formData.custosInsumos.filter((_, i) => i !== index) }));
            const removerOperacional = (index) => setFormData(prev => ({ ...prev, custosOperacionais: formData.custosOperacionais.filter((_, i) => i !== index) }));

            const handleSubmit = (e) => {
                e.preventDefault();
                const novoDados = {
                    ...formData,
                    id: editingId || Date.now(),
                    totalInsumos: somaInsumosForm,
                    totalOperacional: somaOperacionalForm,
                    totalGeral: totalGeralForm,
                    dataRegistro: new Date().toLocaleDateString('pt-BR')
                };

                if (editingId) {
                    setRelatorios(relatorios.map(r => r.id === editingId ? novoDados : r));
                    setEditingId(null);
                } else {
                    setRelatorios([novoDados, ...relatorios]);
                }
                
                setFormData(initialFormState);
            };

            const handleEdit = (rel) => {
                setFormData(rel);
                setEditingId(rel.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleCancelEdit = () => {
                setFormData(initialFormState);
                setEditingId(null);
            };

            const exportar = async (formato) => {
                if (relatorios.length === 0) return;
                const element = exportRef.current;
                const canvas = await html2canvas(element, { 
                    scale: 3, 
                    useCORS: true, 
                    backgroundColor: "#ffffff",
                    windowWidth: 1000
                });
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                
                if (formato === 'jpg') {
                    const link = document.createElement('a');
                    link.download = `relatorio-oasis-${Date.now()}.jpg`;
                    link.href = imgData;
                    link.click();
                } else {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`relatorio-oasis-${Date.now()}.pdf`);
                }
            };

            return (
                <div className="min-h-screen flex flex-col pb-10">
                    <div className="h-2 w-full bg-emerald-600"></div>

                    {/* ÁREA DE EXPORTAÇÃO (DESIGN PARA IMPRESSÃO) */}
                    <div id="export-area" ref={exportRef} className="p-12">
                        <div className="flex items-center justify-between border-b-4 border-emerald-600 pb-8 mb-10">
                            <div className="flex items-center gap-6">
                                <img src="https://i.imgur.com/qsYPvR2.png" alt="Logo Oasis" className="h-24 w-auto" />
                                <div>
                                    <h1 className="text-4xl font-black text-emerald-800 uppercase leading-none">Fazenda Oasis</h1>
                                    <p className="text-slate-500 text-lg font-bold uppercase tracking-[0.2em] mt-2">Relatório Consolidado de Produção</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-sm font-bold text-slate-400 uppercase">Documento Gerado em:</p>
                                <p className="text-lg font-black text-slate-700">{new Date().toLocaleDateString('pt-BR')}</p>
                            </div>
                        </div>

                        <div className="space-y-12">
                            {relatorios.map(rel => (
                                <div key={rel.id} className="border-2 border-slate-200 rounded-[2rem] p-8 bg-white overflow-hidden page-break-inside-avoid">
                                    <div className="flex justify-between items-end mb-8 border-b-2 border-slate-100 pb-6">
                                        <div>
                                            <div className="bg-emerald-600 text-white px-4 py-1 rounded-full text-sm font-black uppercase inline-block mb-3">
                                                Lote: {rel.bloco}
                                            </div>
                                            <h2 className="text-3xl font-black text-slate-800 uppercase">{rel.ciclo}</h2>
                                            <p className="text-lg font-bold text-slate-500 mt-1">
                                                {new Date(rel.dataInicio).toLocaleDateString('pt-BR')} até {new Date(rel.dataTermino).toLocaleDateString('pt-BR')} ({rel.diasCiclo} dias)
                                            </p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm font-black text-slate-400 uppercase tracking-widest">Custo Total do Lote</p>
                                            <p className="text-5xl font-black text-emerald-600">R$ {rel.totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-12">
                                        <div className="space-y-6">
                                            <div className="flex justify-between items-center border-b-2 border-emerald-500/20 pb-2">
                                                <h4 className="font-black text-emerald-700 uppercase text-lg">Insumos</h4>
                                                <span className="font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg">R$ {rel.totalInsumos.toFixed(2)}</span>
                                            </div>
                                            <div className="space-y-3">
                                                {rel.custosInsumos.map((ins, idx) => (
                                                    <div key={idx} className="flex justify-between text-lg border-b border-slate-50 pb-1">
                                                        <span className="text-slate-600">{ins.descricao || 'Item'}</span>
                                                        <span className="font-bold text-slate-800">R$ {parseFloat(ins.valor || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="flex justify-between items-center border-b-2 border-blue-500/20 pb-2">
                                                <h4 className="font-black text-blue-700 uppercase text-lg">Operacional</h4>
                                                <span className="font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">R$ {rel.totalOperacional.toFixed(2)}</span>
                                            </div>
                                            <div className="space-y-3">
                                                {rel.custosOperacionais.map((op, idx) => (
                                                    <div key={idx} className="flex justify-between text-lg border-b border-slate-50 pb-1">
                                                        <span className="text-slate-600">{op.categoria || 'Outros'}</span>
                                                        <span className="font-bold text-slate-800">R$ {parseFloat(op.valor || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 bg-slate-50 rounded-2xl p-6 grid grid-cols-2 gap-4">
                                        <div className="text-center border-r border-slate-200">
                                            <p className="text-xs font-black text-slate-400 uppercase">Qtd. Transplantada</p>
                                            <p className="text-2xl font-black text-slate-700">{rel.totalTransplantado} un.</p>
                                        </div>
                                        <div className="text-center">
                                            <p className="text-xs font-black text-slate-400 uppercase">Qtd. Colhida</p>
                                            <p className="text-2xl font-black text-emerald-600">{rel.totalColhido} un.</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* INTERFACE DO USUÁRIO */}
                    <header className="bg-white shadow-sm border-b p-6 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <img src="https://i.imgur.com/qsYPvR2.png" alt="Logo Oasis" className="h-12 w-auto" />
                                <div>
                                    <h1 className="text-xl font-black text-emerald-800 uppercase leading-none tracking-tight">Fazenda Oasis</h1>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Gestão de Produção v2.0</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Total Acumulado</p>
                                    <p className="text-2xl font-black text-emerald-600">R$ {relatorios.reduce((acc, curr) => acc + curr.totalGeral, 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => exportar('jpg')} className="bg-white border-2 border-slate-200 text-slate-600 p-2.5 rounded-xl hover:bg-slate-50 transition-all flex items-center gap-2 text-[10px] font-black uppercase"><Icon name="image" className="w-4 h-4" /> JPEG</button>
                                    <button onClick={() => exportar('pdf')} className="bg-emerald-600 text-white p-2.5 rounded-xl hover:bg-emerald-700 transition-all flex items-center gap-2 text-[10px] font-black uppercase shadow-lg shadow-emerald-100"><Icon name="file-text" className="w-4 h-4" /> Exportar PDF</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto w-full p-6">
                        <div className="flex flex-col lg:flex-row gap-8">
                            {/* Formulário */}
                            <div className="lg:w-5/12">
                                <form onSubmit={handleSubmit} className={`bg-white p-8 rounded-[2.5rem] shadow-xl border-2 transition-all duration-500 ${editingId ? 'border-orange-400 ring-4 ring-orange-50' : 'border-slate-50'} space-y-6`}>
                                    <div className="flex justify-between items-center border-b pb-4">
                                        <h2 className="text-sm font-black uppercase tracking-widest text-slate-600 flex items-center gap-2">
                                            {editingId ? (
                                                <><Icon name="edit-3" className="w-4 h-4 text-orange-500" /> Editando Registro</>
                                            ) : (
                                                <><Icon name="plus-circle" className="w-4 h-4 text-emerald-500" /> Novo Lote</>
                                            )}
                                        </h2>
                                        {editingId && (
                                            <button type="button" onClick={handleCancelEdit} className="text-[10px] font-black text-slate-400 hover:text-rose-500 uppercase">Cancelar</button>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                            <p className="text-[10px] font-black text-emerald-600 uppercase mb-1">Insumos</p>
                                            <p className="text-xl font-black text-emerald-700">R$ {somaInsumosForm.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                        </div>
                                        <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                            <p className="text-[10px] font-black text-blue-600 uppercase mb-1">Operacional</p>
                                            <p className="text-xl font-black text-blue-700">R$ {somaOperacionalForm.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Bloco / Talhão</label>
                                            <input required name="bloco" value={formData.bloco} onChange={handleChange} placeholder="Ex: Bloco A" className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:ring-2 ring-emerald-50 transition-all font-bold" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Cultura / Ciclo</label>
                                            <input required name="ciclo" value={formData.ciclo} onChange={handleChange} placeholder="Ex: Alface Crespa" className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 bg-slate-50 focus:bg-white outline-none focus:ring-2 ring-emerald-50 transition-all font-bold" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Início</label>
                                                <input type="date" required name="dataInicio" value={formData.dataInicio} onChange={handleChange} className="w-full px-4 py-3 text-xs rounded-xl border border-slate-200 bg-slate-50 outline-none font-bold" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Término</label>
                                                <input type="date" required name="dataTermino" value={formData.dataTermino} onChange={handleChange} className="w-full px-4 py-3 text-xs rounded-xl border border-slate-200 bg-slate-50 outline-none font-bold" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Transplantado</label>
                                                <input type="number" required name="totalTransplantado" value={formData.totalTransplantado} onChange={handleChange} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 bg-slate-50 font-bold outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Colhido</label>
                                                <input type="number" required name="totalColhido" value={formData.totalColhido} onChange={handleChange} className="w-full px-4 py-3 text-sm rounded-xl border border-slate-200 bg-slate-50 font-bold text-emerald-600 outline-none" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Lista Dinâmica Insumos */}
                                    <div className="space-y-3 p-5 bg-emerald-50/20 rounded-[1.5rem] border border-emerald-100">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-black text-emerald-700 uppercase tracking-widest flex items-center gap-2">Insumos</label>
                                            <button type="button" onClick={adicionarInsumo} className="bg-emerald-600 text-white p-1 rounded-lg shadow-md hover:bg-emerald-700 transition-colors"><Icon name="plus" className="w-4 h-4" /></button>
                                        </div>
                                        {formData.custosInsumos.map((c, i) => (
                                            <div key={i} className="flex gap-2">
                                                <input placeholder="Descrição" name="descricao" value={c.descricao} onChange={(e) => handleCustoInsumoChange(i, e)} className="flex-grow px-3 py-2 text-xs rounded-lg border border-slate-200 bg-white font-medium outline-none shadow-sm" />
                                                <input type="number" step="0.01" placeholder="R$" name="valor" value={c.valor} onChange={(e) => handleCustoInsumoChange(i, e)} className="w-20 px-3 py-2 text-xs rounded-lg border border-slate-200 font-bold bg-white outline-none shadow-sm" />
                                                {formData.custosInsumos.length > 1 && <button type="button" onClick={() => removerInsumo(i)} className="text-rose-400 hover:text-rose-600 px-1"><Icon name="x" className="w-4 h-4" /></button>}
                                            </div>
                                        ))}
                                    </div>

                                    {/* Lista Dinâmica Operacional */}
                                    <div className="space-y-3 p-5 bg-blue-50/20 rounded-[1.5rem] border border-blue-100">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-black text-blue-700 uppercase tracking-widest flex items-center gap-2">Custos Operacionais</label>
                                            <button type="button" onClick={adicionarOperacional} className="bg-blue-600 text-white p-1 rounded-lg shadow-md hover:bg-blue-700 transition-colors"><Icon name="plus" className="w-4 h-4" /></button>
                                        </div>
                                        {formData.custosOperacionais.map((o, i) => (
                                            <div key={i} className="flex gap-2">
                                                <select name="categoria" value={o.categoria} onChange={(e) => handleOperacionalChange(i, e)} className="flex-grow px-3 py-2 text-xs rounded-lg border border-slate-200 bg-white font-medium outline-none shadow-sm">
                                                    <option value="">Selecione...</option>
                                                    {categoriasOperacionais.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                </select>
                                                <input type="number" step="0.01" placeholder="R$" name="valor" value={o.valor} onChange={(e) => handleOperacionalChange(i, e)} className="w-20 px-3 py-2 text-xs rounded-lg border border-slate-200 font-bold bg-white outline-none shadow-sm" />
                                                {formData.custosOperacionais.length > 1 && <button type="button" onClick={() => removerOperacional(i)} className="text-rose-400 hover:text-rose-600 px-1"><Icon name="x" className="w-4 h-4" /></button>}
                                            </div>
                                        ))}
                                    </div>

                                    <button type="submit" className={`w-full text-white font-black py-5 rounded-[1.5rem] uppercase tracking-widest text-[11px] shadow-xl flex items-center justify-center gap-3 transition-all active:scale-[0.97] ${editingId ? 'bg-orange-500 hover:bg-orange-600 shadow-orange-100' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-100'}`}>
                                        <Icon name={editingId ? "check" : "save"} className="w-5 h-5" /> 
                                        {editingId ? "Finalizar Edição" : "Salvar Registro Completo"}
                                    </button>
                                </form>
                            </div>

                            {/* Histórico Interativo */}
                            <div className="lg:w-7/12">
                                <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden sticky top-32 flex flex-col max-h-[75vh]">
                                    <div className="p-6 bg-slate-50 border-b flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <Icon name="history" className="w-5 h-5 text-emerald-600" />
                                            <h2 className="text-sm font-black uppercase text-slate-700 tracking-wider">Linha do Tempo de Produção</h2>
                                        </div>
                                        <span className="bg-white px-3 py-1 rounded-full border text-[10px] font-black text-slate-400 uppercase">{relatorios.length} Lotes</span>
                                    </div>
                                    <div className="flex-grow overflow-y-auto custom-scroll divide-y divide-slate-100">
                                        {relatorios.length === 0 ? (
                                            <div className="p-24 text-center">
                                                <div className="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-dashed border-slate-200">
                                                    <Icon name="package-open" className="w-8 h-8 text-slate-300" />
                                                </div>
                                                <p className="text-xs font-bold uppercase tracking-widest text-slate-400">Aguardando seu primeiro registro</p>
                                            </div>
                                        ) : relatorios.map(rel => (
                                            <div key={rel.id} className="p-6 hover:bg-emerald-50/20 transition-all group">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="text-[10px] font-black text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md border border-emerald-100 uppercase">{rel.bloco}</span>
                                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter italic">{new Date(rel.dataInicio).toLocaleDateString('pt-BR')}</span>
                                                        </div>
                                                        <h3 className="font-black text-slate-800 uppercase text-lg leading-none">{rel.ciclo}</h3>
                                                        <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">{rel.diasCiclo} dias de cultivo</p>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-2">
                                                        <div className="text-right">
                                                            <p className="font-black text-emerald-600 text-xl leading-none">R$ {rel.totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                                            <p className="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Valor do Lote</p>
                                                        </div>
                                                        <button onClick={() => handleEdit(rel)} className="opacity-0 group-hover:opacity-100 flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-black text-orange-500 hover:bg-orange-50 hover:border-orange-200 transition-all shadow-sm">
                                                            <Icon name="edit-2" className="w-3 h-3" /> Editar
                                                        </button>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-3 mt-4">
                                                    <div className="bg-emerald-50/40 p-3 rounded-xl border border-emerald-100/50">
                                                        <p className="text-[9px] font-black text-emerald-700 uppercase mb-2 flex justify-between">Insumos <span>R$ {rel.totalInsumos.toFixed(2)}</span></p>
                                                        <div className="space-y-1 max-h-24 overflow-y-auto custom-scroll pr-1">
                                                            {rel.custosInsumos.map((ins, idx) => (
                                                                <div key={idx} className="flex justify-between text-[10px] text-slate-600 font-medium">
                                                                    <span className="truncate pr-1 opacity-70">• {ins.descricao || 'Item'}</span>
                                                                    <span className="font-bold shrink-0">R$ {parseFloat(ins.valor || 0).toFixed(2)}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div className="bg-blue-50/40 p-3 rounded-xl border border-blue-100/50">
                                                        <p className="text-[9px] font-black text-blue-700 uppercase mb-2 flex justify-between">Operacional <span>R$ {rel.totalOperacional.toFixed(2)}</span></p>
                                                        <div className="space-y-1 max-h-24 overflow-y-auto custom-scroll pr-1">
                                                            {rel.custosOperacionais.map((op, idx) => (
                                                                <div key={idx} className="flex justify-between text-[10px] text-slate-600 font-medium">
                                                                    <span className="truncate pr-1 opacity-70">• {op.categoria || 'Outros'}</span>
                                                                    <span className="font-bold shrink-0">R$ {parseFloat(op.valor || 0).toFixed(2)}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
