<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oasis - Relatório de Custo de Produção</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        #export-area {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1200px; 
            background-color: #064e3b; 
            padding: 60px;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .export-label { font-size: 1.8rem; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; }
        .export-value { font-size: 4rem; font-weight: 900; line-height: 1; }
        .export-title { font-size: 6rem; font-weight: 900; line-height: 1; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [formData, setFormData] = useState({
                bloco: '', ciclo: '', numCiclo: '', dataInicio: '', dataFim: '', 
                totalColhido: '', totalKg: '', totalUnidades: '', totalCaixas: '',
                litrosDia: '', litrosPlantaManual: '', volumeTotalL: '',
                custoKgManual: '',
                custosInsumos: [{ descricao: '', valor: '' }],
                custosOperacionais: [{ categoria: '', valor: '' }]
            });

            const [relatorios, setRelatorios] = useState([]);
            const exportAreaRef = useRef(null);
            const categoriasOperacionais = ["Enel", "Folha", "MEI", "Avulso", "Capina", "Transporte", "Outros"];

            const metrics = useMemo(() => {
                let dias = 0;
                if (formData.dataInicio && formData.dataFim) {
                    const start = new Date(formData.dataInicio);
                    const end = new Date(formData.dataFim);
                    const diff = end - start;
                    dias = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                }

                const totalInsumos = formData.custosInsumos.reduce((acc, curr) => acc + (parseFloat(curr.valor) || 0), 0);
                const totalOperacional = formData.custosOperacionais.reduce((acc, curr) => acc + (parseFloat(curr.valor) || 0), 0);
                const totalGeral = totalInsumos + totalOperacional;
                const kg = parseFloat(formData.totalKg) || 0;
                const colhido = parseFloat(formData.totalColhido) || 0;
                
                const pesoMedioKg = (kg > 0 && colhido > 0) ? (kg / colhido).toFixed(3) : "0.000";
                const custoSugerido = kg > 0 ? (totalGeral / kg).toFixed(2) : "0.00";
                
                return { diasCiclo: dias, totalInsumos, totalOperacional, totalGeral, pesoMedioKg, custoSugerido };
            }, [formData]);

            const prepararCanvas = async () => {
                const element = exportAreaRef.current;
                element.style.position = "relative";
                element.style.left = "0";
                element.style.top = "0";
                
                const canvas = await html2canvas(element, {
                    scale: 3, 
                    useCORS: true,
                    backgroundColor: "#064e3b",
                    windowWidth: 1200
                });

                element.style.position = "absolute";
                element.style.left = "-9999px";
                return canvas;
            };

            const exportarImagem = async () => {
                const canvas = await prepararCanvas();
                const link = document.createElement('a');
                link.download = `Oasis_Relatorio_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            };

            const exportarPDF = async () => {
                const canvas = await prepararCanvas();
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const imgProps = pdf.getImageProperties(imgData);
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Oasis_Relatorio_${Date.now()}.pdf`);
            };

            const handleChange = (e) => setFormData(p => ({ ...p, [e.target.name]: e.target.value }));
            
            const updateList = (type, index, field, value) => {
                const list = [...formData[type]];
                list[index][field] = value;
                setFormData(p => ({ ...p, [type]: list }));
            };

            const addRow = (type) => {
                const emptyRow = type === 'custosInsumos' ? { descricao: '', valor: '' } : { categoria: '', valor: '' };
                setFormData(p => ({ ...p, [type]: [...p[type], emptyRow] }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const novoRelatorio = {
                    ...formData,
                    id: Date.now(),
                    ...metrics,
                    dataRegistro: new Date().toLocaleDateString('pt-BR'),
                    // Deep copy of lists to ensure history is immutable
                    custosInsumos: formData.custosInsumos.map(item => ({ ...item })),
                    custosOperacionais: formData.custosOperacionais.map(item => ({ ...item }))
                };
                setRelatorios([novoRelatorio, ...relatorios]);
                setFormData({
                    bloco: '', ciclo: '', numCiclo: '', dataInicio: '', dataFim: '', 
                    totalColhido: '', totalKg: '', totalUnidades: '', totalCaixas: '',
                    litrosDia: '', litrosPlantaManual: '', volumeTotalL: '',
                    custoKgManual: '',
                    custosInsumos: [{ descricao: '', valor: '' }],
                    custosOperacionais: [{ categoria: '', valor: '' }]
                });
            };

            return (
                <div className="min-h-screen flex flex-col pb-10">
                    
                    {/* ÁREA DE EXPORTAÇÃO (MESMO LAYOUT DO index.html ANTERIOR) */}
                    <div id="export-area" ref={exportAreaRef}>
                        <div className="bg-white p-24 rounded-[6rem] shadow-2xl">
                            <div className="flex items-center justify-between border-b-[20px] border-emerald-500 pb-16 mb-16">
                                <div className="flex items-center gap-14">
                                    <div className="bg-emerald-50 p-8 rounded-[3rem]">
                                        <img src="https://i.imgur.com/qsYPvR2.png" alt="Oasis" className="h-40 w-auto" />
                                    </div>
                                    <div>
                                        <h1 className="text-8xl font-black text-emerald-950 uppercase tracking-tighter">Fazenda Oasis</h1>
                                        <p className="text-4xl text-emerald-600 font-bold uppercase tracking-[0.4em] mt-4">Relatório Detalhado de Colheita</p>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-24">
                                {(relatorios.length > 0 ? [relatorios[0]] : []).map(rel => (
                                    <div key={rel.id} className="bg-slate-50 border-[8px] border-slate-200 p-20 rounded-[5rem]">
                                        <div className="flex justify-between items-start mb-16">
                                            <div className="space-y-6">
                                                <div className="flex gap-6">
                                                    <span className="bg-emerald-800 text-white text-3xl font-black px-10 py-4 rounded-3xl uppercase tracking-wider">{rel.bloco}</span>
                                                    <span className="bg-blue-600 text-white text-3xl font-black px-10 py-4 rounded-3xl uppercase tracking-wider">{rel.diasCiclo} DIAS</span>
                                                </div>
                                                <h2 className="export-title text-slate-900">{rel.ciclo} <span className="text-emerald-500">#{rel.numCiclo}</span></h2>
                                                <p className="text-4xl text-slate-500 font-bold italic">Período: {rel.dataInicio} — {rel.dataFim}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="export-label mb-4">Investimento Total</p>
                                                <p className="export-value text-emerald-700" style={{fontSize: '6rem'}}>R$ {parseFloat(rel.totalGeral).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-10 mb-16">
                                            <div className="bg-white p-12 rounded-[4rem] border-4 border-slate-100 text-center">
                                                <p className="export-label mb-4">Custo por Kg (Manual)</p>
                                                <p className="export-value text-emerald-900">R$ {rel.custoKgManual || '0,00'}</p>
                                            </div>
                                            <div className="bg-white p-12 rounded-[4rem] border-4 border-slate-100 text-center">
                                                <p className="export-label mb-4">Peso Médio Planta</p>
                                                <p className="export-value text-blue-700">{rel.pesoMedioKg} kg</p>
                                            </div>
                                            <div className="bg-white p-12 rounded-[4rem] border-4 border-slate-100 text-center col-span-2 grid grid-cols-4 gap-4 items-center">
                                                <div>
                                                    <p className="export-label mb-2 text-slate-400">Peso Total</p>
                                                    <p className="text-5xl font-black text-slate-800">{rel.totalKg} kg</p>
                                                </div>
                                                <div>
                                                    <p className="export-label mb-2 text-slate-400">Unidades</p>
                                                    <p className="text-5xl font-black text-slate-800">{rel.totalUnidades || '0'}</p>
                                                </div>
                                                <div>
                                                    <p className="export-label mb-2 text-slate-400">Caixas</p>
                                                    <p className="text-5xl font-black text-slate-800">{rel.totalCaixas || '0'}</p>
                                                </div>
                                                <div className="bg-blue-50 p-4 rounded-3xl border-2 border-blue-100">
                                                    <p className="export-label mb-2 text-blue-400 text-[1.4rem]">Irrigação Total</p>
                                                    <p className="text-5xl font-black text-blue-600">{rel.volumeTotalL} L</p>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-16">
                                            <div className="bg-white p-14 rounded-[4.5rem] border-4 border-slate-100">
                                                <h3 className="text-4xl font-black text-slate-400 uppercase mb-10 border-b-4 pb-6">Insumos</h3>
                                                {rel.custosInsumos.map((c, i) => (
                                                    <div key={i} className="flex justify-between text-3xl py-4 border-b-2 border-slate-50 last:border-0">
                                                        <span className="text-slate-600 font-bold uppercase">{c.descricao}</span>
                                                        <span className="font-black text-slate-900">R$ {parseFloat(c.valor || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="bg-emerald-50 p-14 rounded-[4.5rem] border-4 border-emerald-100">
                                                <h3 className="text-4xl font-black text-emerald-600 uppercase mb-10 border-b-4 border-emerald-200 pb-6">Operacional</h3>
                                                {rel.custosOperacionais.map((o, i) => (
                                                    <div key={i} className="flex justify-between text-3xl py-4 border-b-2 border-emerald-100 last:border-0">
                                                        <span className="text-emerald-800 font-bold uppercase">{o.categoria}</span>
                                                        <span className="font-black text-emerald-950">R$ {parseFloat(o.valor || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* INTERFACE PRINCIPAL */}
                    <header className="bg-emerald-900 shadow-xl p-6 no-print">
                        <div className="max-w-7xl mx-auto flex justify-between items-center text-white">
                            <div className="flex items-center gap-4">
                                <img src="https://i.imgur.com/qsYPvR2.png" alt="Oasis" className="h-10 bg-white p-1 rounded-lg" />
                                <h1 className="text-xl font-black uppercase tracking-tighter">Fazenda Oasis | <span className="text-emerald-400">Gestão Avançada</span></h1>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={exportarImagem} className="bg-white/10 hover:bg-white/20 px-5 py-2 rounded-xl text-xs font-black uppercase transition-all">Baixar JPG</button>
                                <button onClick={exportarPDF} className="bg-emerald-500 hover:bg-emerald-400 px-6 py-2 rounded-xl text-xs font-black uppercase shadow-lg transition-all">Baixar PDF</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full p-6 grid lg:grid-cols-2 gap-8 no-print">
                        {/* FORMULÁRIO DE ENTRADA */}
                        <div className="space-y-6">
                            <form onSubmit={handleSubmit} className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200 space-y-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Localização</label>
                                        <input required name="bloco" value={formData.bloco} onChange={handleChange} placeholder="Ex: Estufa 02" className="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 font-bold outline-none focus:border-emerald-500" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Variedade</label>
                                        <input required name="ciclo" value={formData.ciclo} onChange={handleChange} className="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 font-bold outline-none focus:border-emerald-500" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Lote #</label>
                                        <input type="number" required name="numCiclo" value={formData.numCiclo} onChange={handleChange} className="w-full px-4 py-3 rounded-xl border-2 border-slate-100 bg-slate-50 font-bold outline-none focus:border-emerald-500" />
                                    </div>
                                </div>

                                {/* CUSTO MANUAL */}
                                <div className="bg-emerald-50 p-6 rounded-3xl border-2 border-emerald-100">
                                    <div className="flex justify-between items-end gap-6">
                                        <div className="flex-1">
                                            <label className="text-[10px] font-black text-emerald-600 uppercase mb-2 block flex items-center gap-2">
                                                <Icon name="edit-3" className="w-3 h-3"/> Custo Final por KG (Manual)
                                            </label>
                                            <input type="number" step="0.01" name="custoKgManual" value={formData.custoKgManual} onChange={handleChange} placeholder="R$ 0,00" className="w-full text-3xl font-black text-emerald-900 bg-white border-2 border-emerald-200 p-4 rounded-2xl focus:ring-4 focus:ring-emerald-200 outline-none" />
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[9px] font-black text-emerald-400 uppercase">Automático</p>
                                            <p className="text-xl font-bold text-emerald-300">R$ {metrics.custoSugerido}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    {/* PRODUÇÃO */}
                                    <div className="p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 space-y-4">
                                        <div className="text-[10px] font-black text-slate-500 uppercase border-b pb-2 flex items-center gap-2"><Icon name="package" className="w-3 h-3"/> Produção</div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[8px] font-black text-slate-400 uppercase mb-1 block">Peso Total (kg)</label>
                                                <input type="number" step="0.001" name="totalKg" value={formData.totalKg} onChange={handleChange} className="w-full p-2 rounded-lg border text-sm font-bold" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-400 uppercase mb-1 block">Plantas</label>
                                                <input type="number" name="totalColhido" value={formData.totalColhido} onChange={handleChange} className="w-full p-2 rounded-lg border text-sm font-bold" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[8px] font-black text-slate-400 uppercase mb-1 block">Unidades</label>
                                                <input type="number" name="totalUnidades" value={formData.totalUnidades} onChange={handleChange} className="w-full p-2 rounded-lg border text-sm font-bold" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black text-slate-400 uppercase mb-1 block">Caixas</label>
                                                <input type="number" name="totalCaixas" value={formData.totalCaixas} onChange={handleChange} className="w-full p-2 rounded-lg border text-sm font-bold" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* IRRIGAÇÃO */}
                                    <div className="p-5 bg-blue-50/50 rounded-3xl border-2 border-blue-100 space-y-2">
                                        <div className="text-[10px] font-black text-blue-600 uppercase border-b border-blue-100 pb-2 flex items-center gap-2"><Icon name="droplets" className="w-3 h-3"/> Irrigação</div>
                                        <input type="number" step="0.01" name="volumeTotalL" value={formData.volumeTotalL} onChange={handleChange} placeholder="Vol. Total (L)" className="w-full p-2 rounded-lg border text-xs font-bold" />
                                        <input type="number" step="0.01" name="litrosDia" value={formData.litrosDia} onChange={handleChange} placeholder="Ltrs / Dia" className="w-full p-2 rounded-lg border text-xs font-bold" />
                                        <input type="number" step="0.01" name="litrosPlantaManual" value={formData.litrosPlantaManual} onChange={handleChange} placeholder="Ltrs / Planta" className="w-full p-2 rounded-lg border text-xs font-bold" />
                                    </div>
                                </div>

                                {/* CUSTOS */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-5 bg-white rounded-3xl border-2 border-slate-100">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase">Insumos</h3>
                                            <button type="button" onClick={() => addRow('custosInsumos')} className="bg-emerald-100 text-emerald-700 p-2 rounded-lg"><Icon name="plus" className="w-4 h-4"/></button>
                                        </div>
                                        {formData.custosInsumos.map((c, i) => (
                                            <div key={i} className="flex gap-2 mb-2">
                                                <input placeholder="Item" value={c.descricao} onChange={(e) => updateList('custosInsumos', i, 'descricao', e.target.value)} className="flex-grow p-2 text-xs border rounded-lg bg-slate-50" />
                                                <input type="number" placeholder="R$" value={c.valor} onChange={(e) => updateList('custosInsumos', i, 'valor', e.target.value)} className="w-20 p-2 text-xs border rounded-lg font-bold text-right" />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-5 bg-emerald-50/30 rounded-3xl border-2 border-emerald-100">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-[10px] font-black text-emerald-600 uppercase">Operacional</h3>
                                            <button type="button" onClick={() => addRow('custosOperacionais')} className="bg-emerald-100 text-emerald-700 p-2 rounded-lg"><Icon name="plus" className="w-4 h-4"/></button>
                                        </div>
                                        {formData.custosOperacionais.map((o, i) => (
                                            <div key={i} className="flex gap-2 mb-2">
                                                <select value={o.categoria} onChange={(e) => updateList('custosOperacionais', i, 'categoria', e.target.value)} className="flex-grow p-2 text-xs border rounded-lg bg-white">
                                                    <option value="">Selecione...</option>
                                                    {categoriasOperacionais.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                </select>
                                                <input type="number" placeholder="R$" value={o.valor} onChange={(e) => updateList('custosOperacionais', i, 'valor', e.target.value)} className="w-20 p-2 text-xs border rounded-lg font-bold text-right" />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button type="submit" className="w-full bg-emerald-700 text-white font-black py-5 rounded-3xl uppercase text-base shadow-xl hover:bg-emerald-800 transition-all flex items-center justify-center gap-3">
                                    <Icon name="save" className="w-5 h-5"/> Registrar no Histórico
                                </button>
                            </form>
                        </div>

                        {/* HISTÓRICO DETALHADO */}
                        <div className="space-y-4 max-h-[90vh] overflow-y-auto custom-scroll pr-3">
                            <h2 className="text-xs font-black uppercase text-slate-400 tracking-widest px-4 flex items-center gap-2"><Icon name="database" className="w-3 h-3"/> Histórico Completo</h2>
                            
                            {relatorios.length === 0 && (
                                <div className="text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                    <Icon name="inbox" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                                    <p className="text-slate-400 font-bold">Nenhum registro ainda.</p>
                                </div>
                            )}

                            {relatorios.map(rel => (
                                <div key={rel.id} className="bg-white rounded-[2.5rem] shadow-lg border border-slate-200 overflow-hidden hover:shadow-2xl transition-all">
                                    {/* Cabeçalho do Card */}
                                    <div className="p-6 bg-slate-50 border-b border-slate-100">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="flex items-center gap-3 mb-1">
                                                    <span className="text-[9px] font-black text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded-md uppercase">{rel.bloco}</span>
                                                    <span className="text-[9px] font-black text-blue-700 bg-blue-100 px-2 py-0.5 rounded-md uppercase">Lote #{rel.numCiclo}</span>
                                                </div>
                                                <h3 className="text-xl font-black text-slate-800 uppercase">{rel.ciclo}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 italic">Registrado em {rel.dataRegistro}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-2xl font-black text-emerald-700">R$ {rel.custoKgManual || '0,00'}/kg</p>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Custo Final</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Detalhamento do Registro */}
                                    <div className="p-6 space-y-6">
                                        {/* Grid de Produção e Irrigação */}
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <p className="text-[9px] font-black text-slate-400 uppercase border-b pb-1">Produção</p>
                                                <div className="grid grid-cols-2 gap-y-1 text-xs font-bold text-slate-600">
                                                    <span>Total Kg:</span> <span className="text-right">{rel.totalKg} kg</span>
                                                    <span>Plantas:</span> <span className="text-right">{rel.totalColhido}</span>
                                                    <span>Unid:</span> <span className="text-right font-black text-blue-600">{rel.totalUnidades || 0}</span>
                                                    <span>Caixas:</span> <span className="text-right font-black text-blue-600">{rel.totalCaixas || 0}</span>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <p className="text-[9px] font-black text-blue-400 uppercase border-b border-blue-100 pb-1">Irrigação</p>
                                                <div className="grid grid-cols-2 gap-y-1 text-xs font-bold text-blue-600">
                                                    <span>Volume:</span> <span className="text-right">{rel.volumeTotalL} L</span>
                                                    <span>L/Dia:</span> <span className="text-right">{rel.litrosDia} L</span>
                                                    <span>L/Planta:</span> <span className="text-right">{rel.litrosPlantaManual} L</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Detalhamento de Custos Lançados */}
                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <div className="space-y-2">
                                                <p className="text-[9px] font-black text-slate-400 uppercase">Insumos Detalhado</p>
                                                {rel.custosInsumos.map((ins, idx) => (
                                                    ins.descricao && (
                                                        <div key={idx} className="flex justify-between text-[10px] font-bold text-slate-500 border-b border-slate-200/50 py-1 last:border-0">
                                                            <span className="truncate pr-2">{ins.descricao}</span>
                                                            <span className="shrink-0 text-slate-800">R$ {parseFloat(ins.valor || 0).toFixed(2)}</span>
                                                        </div>
                                                    )
                                                ))}
                                                <div className="flex justify-between text-[10px] font-black text-emerald-700 pt-1">
                                                    <span>Subtotal</span>
                                                    <span>R$ {rel.totalInsumos.toFixed(2)}</span>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <p className="text-[9px] font-black text-emerald-400 uppercase">Operacional Detalhado</p>
                                                {rel.custosOperacionais.map((ope, idx) => (
                                                    ope.categoria && (
                                                        <div key={idx} className="flex justify-between text-[10px] font-bold text-emerald-600 border-b border-emerald-100 py-1 last:border-0">
                                                            <span>{ope.categoria}</span>
                                                            <span className="text-emerald-900 font-black">R$ {parseFloat(ope.valor || 0).toFixed(2)}</span>
                                                        </div>
                                                    )
                                                ))}
                                                <div className="flex justify-between text-[10px] font-black text-emerald-800 pt-1">
                                                    <span>Subtotal</span>
                                                    <span>R$ {rel.totalOperacional.toFixed(2)}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Total Geral no Card */}
                                        <div className="flex justify-between items-center bg-emerald-900 text-white p-4 rounded-2xl">
                                            <span className="text-[10px] font-black uppercase tracking-widest opacity-70">Investimento Total do Lote</span>
                                            <span className="text-xl font-black">R$ {rel.totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
